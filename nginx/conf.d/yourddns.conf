# HTTP — redirect to HTTPS (except Let's Encrypt challenge)
server {
    listen 80;
    server_name yourddns.com www.yourddns.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://yourddns.com$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name yourddns.com;

    ssl_certificate     /etc/letsencrypt/live/yourddns.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourddns.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# www redirect
server {
    listen 443 ssl;
    http2 on;
    server_name www.yourddns.com;

    ssl_certificate     /etc/letsencrypt/live/yourddns.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourddns.com/privkey.pem;

    return 301 https://yourddns.com$request_uri;
}

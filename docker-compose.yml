services:
  app:
    build: .
    container_name: yourddns-app
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    ports:
      - "5300:5300/udp"
      - "5300:5300/tcp"
    expose:
      - "3000"
    networks:
      - yourddns

  caddy:
    image: caddy:2-alpine
    container_name: yourddns-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file: .env
    depends_on:
      - app
    networks:
      - yourddns

networks:
  yourddns:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:

services:
  app:
    build: .
    container_name: yourddns-app
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    # network_mode: host is required for the DNS server to see real client IPs.
    # Without it, Docker NAT replaces all source IPs with the bridge gateway (172.18.0.1).
    # NOTE: network_mode: host does NOT work on Docker Desktop for Windows/Mac.
    # Remove this line and restore ports/expose/networks if running on Windows/Mac.
    network_mode: host

  caddy:
    image: caddy:2-alpine
    container_name: yourddns-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file: .env
    depends_on:
      - app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - yourddns

networks:
  yourddns:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
